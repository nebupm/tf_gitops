name: Terraform Multi ENV CD
on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  actions: read
  contents: read # Allows GITHUB_TOKEN to clone your code
  id-token: write # Required by the nested deploy job to fetch AWS STS tokens
  pull-requests: write # Required by the nested deploy job

env:
  TF_LOG: INFO
  TF_INPUT: false
  TF_VERSION: ${{ vars.TF_VERSION }}

jobs:
  # Get the workflow run ID from the CI workflow for artifact retrieval
  get-run-id:
    name: Get CI Run ID
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get-run.outputs.run_id }}
    steps:
      - name: Get CI Workflow Run ID
        id: get-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow "Terraform Multi ENV CI" \
            --branch ${{ github.head_ref }} \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Found CI Run ID: $RUN_ID"

  # Preflight: detect which environments have been bootstrapped.
  # An environment is "ready" only if its backend config (backends/<env>.hcl) exists.
  # Environments without a backend config are skipped rather than failed,
  # so the pipeline stays green for not-yet-bootstrapped envs (e.g. prod).
  preflight:
    name: Preflight - detect bootstrapped environments
    needs: [get-run-id]
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      dev_ready: ${{ steps.check.outputs.dev_ready }}
      staging_ready: ${{ steps.check.outputs.staging_ready }}
      prod_ready: ${{ steps.check.outputs.prod_ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check backend configs
        id: check
        run: |
          for env in dev staging prod; do
            if [ -f "backends/${env}.hcl" ]; then
              echo "${env}_ready=true" >> "$GITHUB_OUTPUT"
              echo "backends/${env}.hcl found — ${env} will deploy"
            else
              echo "${env}_ready=false" >> "$GITHUB_OUTPUT"
              echo "backends/${env}.hcl missing — ${env} skipped (not yet bootstrapped)"
            fi
          done

  # Deploy to each environment in sequence
  # Each environment uses the reusable workflow and depends on the previous one.
  # The `*_ready` gate skips an environment whose backend has not been created.
  deploy-dev:
    name: Deploy dev
    needs: [get-run-id, preflight]
    if: github.event.pull_request.merged == true && needs.preflight.outputs.dev_ready == 'true'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: dev
      terraform_version: ${{ vars.TF_VERSION }}
      ci_run_id: ${{ needs.get-run-id.outputs.run_id }}

  deploy-staging:
    name: Deploy staging
    needs: [get-run-id, preflight, deploy-dev]
    if: github.event.pull_request.merged == true && needs.preflight.outputs.staging_ready == 'true'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: staging
      terraform_version: ${{ vars.TF_VERSION }}
      ci_run_id: ${{ needs.get-run-id.outputs.run_id }}
  deploy-prod:
    name: Deploy prod
    needs: [get-run-id, preflight, deploy-staging]
    if: github.event.pull_request.merged == true && needs.preflight.outputs.prod_ready == 'true'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: prod
      terraform_version: ${{ vars.TF_VERSION }}
      ci_run_id: ${{ needs.get-run-id.outputs.run_id }}
      