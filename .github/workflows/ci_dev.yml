name: Terraform DEV CI (Manual Trigger)

#on:
#  pull_request:
#    branches:
#      - main
on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

env:
  TF_LOG: INFO
  TF_INPUT: false
  TF_VERSION: ${{ vars.TF_VERSION }}

# 1. Added top-level permissions block for OIDC token generation
permissions:
  contents: read # Allows GITHUB_TOKEN to clone your code

jobs:
  # Format check
  format:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  # Validate configuration
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # TFLint
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

  # Trivy security scan
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: CRITICAL

  # Terraform Plan for dev environment
  plan:
    name: Terraform Plan Dev
    runs-on: ubuntu-latest
    needs: [format, validate, tflint, trivy]
    permissions:
      pull-requests: write
      id-token: write # Allows GITHUB_TOKEN to request the JWT token for AWS OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # 3. Modified to use OIDC via IAM Role instead of access keys
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config="./backends/dev.hcl"

      - name: Terraform Plan
        run: terraform plan -var-file="./environments/dev.tfvars" -out=tf.plan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-dev-${{ github.run_id }}
          path: tf.plan
          retention-days: 5

      - name: Setup tf-summarize
        uses: kishaningithub/setup-tf-summarize@v2

      - name: Generate Plan Summary
        id: summary
        run: |
          terraform show -json tf.plan > plan.json
          tf-summarize -md plan.json > summary.md

      - name: Add Plan Summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');
            const body = `## Terraform Plan Summary - dev\n\n${summary}\n\n*Workflow Run ID: ${{ github.run_id }}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
