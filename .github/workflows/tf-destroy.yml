name: "Terraform Destroy Environment"

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    # CRITICAL: This line ensures the job only runs if YOU triggered it
    if: github.actor == 'deneasta@gmail.com'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
